<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
        th { background-color: #f4f4f4; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 100px; }
        input[type="text"], select { padding: 5px; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; margin-right: 5px; }
        .actions button { padding: 5px 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Gestión de Usuarios</h1>

    <div id="user-form-container">
        <h3 id="form-title">Añadir Nuevo Usuario</h3>
        <input type="hidden" id="user-id">
        <div class="form-group">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" required>
        </div>
        <div class="form-group">
            <label for="clave">Clave:</label>
            <input type="text" id="clave" required>
        </div>
        <div class="form-group">
            <label for="rol">Rol:</label>
            <select id="rol">
                <option value="Lector">Lector</option>
                <option value="Editor">Editor</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        <div class="form-group">
            <label for="rutaimg">Ruta Img:</label>
            <input type="text" id="rutaimg">
        </div>
        <div class="form-group">
            <label for="activo">Activo:</label>
            <select id="activo">
                <option value="1">Sí</option>
                <option value="0">No</option>
            </select>
        </div>
        <button id="save-btn">Guardar</button>
        <button id="cancel-btn" style="display: none;">Cancelar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Activo</th>
                <th>Ruta Img</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="user-table-body">
            <!-- Los usuarios se cargarán aquí dinámicamente -->
        </tbody>
    </table>

    <script src="./renderer.js"></script>
</body>
</html>
